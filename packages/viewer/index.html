<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>cladu-regel · replay</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0; background: #0e1116; color: #e6edf3;
        font: 14px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
        display: flex; flex-direction: column; align-items: center; gap: 12px;
        padding: 20px;
      }
      #score { font-size: 20px; letter-spacing: 0.5px; }
      #score .home { color: #4f9dff; }
      #score .away { color: #ff7a59; }
      canvas { background: #14532d; border-radius: 8px; box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
      #controls { display: flex; align-items: center; gap: 12px; }
      button {
        background: #21262d; color: #e6edf3; border: 1px solid #30363d;
        border-radius: 6px; padding: 6px 12px; cursor: pointer; font: inherit;
      }
      button:hover { background: #30363d; }
      input[type="range"] { width: 480px; }
      #time { color: #8b949e; min-width: 90px; }
    </style>
  </head>
  <body>
    <div id="score">loading…</div>
    <canvas id="pitch" width="1050" height="680"></canvas>
    <div id="controls">
      <button id="playpause">⏸ pause</button>
      <input id="scrub" type="range" min="0" max="0" value="0" />
      <span id="time">0.0s</span>
      <label>speed
        <select id="speed">
          <option value="0.5">0.5×</option>
          <option value="1" selected>1×</option>
          <option value="2">2×</option>
          <option value="4">4×</option>
        </select>
      </label>
    </div>
    <script type="module" src="./viewer.js"></script>
  </body>
</html>
