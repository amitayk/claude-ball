# Fly.io config for the arena API + sandboxed runner.
#
# The JSON ladder store is persisted on a volume (see [mounts] below). Before the
# first deploy of a fresh app, create the volume in this region:
#   fly volumes create kr_data --size 1 --region ams
app = "claude-ball"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8787"
  KR_DATA = "/data/arena.json"
  KR_PLACEMENT_SEEDS = "3"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

# Matches are CPU-bound (bundling + simulation); give the machine real room.
[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory = "1gb"

# Persistent ladder store on a volume (single machine; swap for Postgres to
# scale horizontally — see DEPLOYMENT.md).
[mounts]
  source = "kr_data"
  destination = "/data"
