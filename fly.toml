# Fly.io config for the arena API + sandboxed runner.
#
# First deploy (via the GitHub launcher or `fly deploy`) uses EPHEMERAL storage —
# the JSON ladder resets on redeploy. To make it persistent, create a volume and
# re-add the [mounts] block below:
#   fly volumes create kr_data --size 1 --region ams
#   (then set KR_DATA=/data/arena.json and uncomment [mounts])
app = "cladu-regel"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8787"
  KR_DATA = "/data/arena.json"
  KR_PLACEMENT_SEEDS = "3"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

# Matches are CPU-bound (bundling + simulation); give the machine real room.
[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory = "1gb"

# Persistent ladder store — enable once you've created the volume (see top):
# [mounts]
#   source = "kr_data"
#   destination = "/data"
