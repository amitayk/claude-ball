<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>claude-ball · palette lab</title>
    <style>
      body { margin: 0; background: #08090b; color: #e6edf3; font: 15px/1.5 ui-sans-serif, system-ui, sans-serif; padding: 28px; }
      h1 { text-align: center; font-weight: 800; letter-spacing: -0.5px; }
      .intro { text-align: center; color: #8b949e; max-width: 640px; margin: 0 auto 28px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 22px; max-width: 1200px; margin: 0 auto; }

      /* a mock arena card themed entirely by CSS vars set per-palette */
      .pal { border-radius: 16px; overflow: hidden; border: 1px solid #222; background: var(--bg); color: var(--text); }
      .pal .palhead { display: flex; align-items: baseline; justify-content: space-between; padding: 14px 16px 0; }
      .palname { font-weight: 800; font-size: 15px; }
      .palhex { font: 11px ui-monospace, monospace; color: var(--muted); }
      .panel { margin: 12px; padding: 14px; border-radius: 12px; background: var(--card); border: 1px solid var(--line); }

      .wordmark { font-weight: 800; letter-spacing: -0.3px; }
      .wordmark .ball { color: var(--accent); }
      .tag { color: var(--muted); font-size: 12px; margin: 2px 0 12px; }
      .btn { display: inline-block; background: var(--accent); color: var(--ink); font-weight: 700; border: none; border-radius: 9px; padding: 7px 14px; font-size: 13px; }

      .row { display: grid; grid-template-columns: 26px 1fr auto; gap: 10px; align-items: center; padding: 8px 4px; }
      .row + .row { border-top: 1px solid var(--line); }
      .rank { text-align: center; font-weight: 700; color: var(--muted); }
      .rank.m1 { color: var(--gold); }
      .nm { font-weight: 650; display: flex; gap: 7px; align-items: center; }
      .pill { font-size: 9.5px; text-transform: uppercase; letter-spacing: .4px; padding: 1px 6px; border-radius: 999px; border: 1px solid var(--line); color: var(--muted); }
      .pill.lib { color: var(--away); border-color: var(--away); }
      .pill.you { color: var(--home); border-color: var(--home); }
      .elo { text-align: right; font-weight: 800; font-variant-numeric: tabular-nums; }
      .bar { height: 4px; border-radius: 3px; margin-top: 4px; background: rgba(255,255,255,.1); }
      .bar > span { display: block; height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--pitch), var(--accent)); }

      .pitch { height: 84px; margin: 12px; border-radius: 10px; background: var(--pitch); position: relative; border: 1px solid rgba(255,255,255,.12); }
      .pitch::before { content: ""; position: absolute; left: 50%; top: 6px; bottom: 6px; width: 1px; background: rgba(255,255,255,.4); }
      .pitch::after { content: ""; position: absolute; left: 50%; top: 50%; width: 34px; height: 34px; transform: translate(-50%, -50%); border: 1px solid rgba(255,255,255,.4); border-radius: 50%; }
      .dot { position: absolute; width: 11px; height: 11px; border-radius: 50%; }
      .dot.h { background: var(--home); } .dot.a { background: var(--away); } .dot.b { background: #fff; width: 7px; height: 7px; }
    </style>
  </head>
  <body>
    <h1>⚽ claude-ball — palette lab</h1>
    <p class="intro">Soccer-themed schemes on the real components (wordmark, button, leaderboard, pitch). Tell me which name you like, e.g. "go with Floodlit" — or mix two.</p>
    <div class="grid" id="grid"></div>

    <script>
      const palettes = [
        { name: "Grass", hex: "turf + lime",
          v: { bg:"#0a130d", card:"#101d14", panel:"#101d14", line:"#22382a", text:"#eaf3ec", muted:"#8fa899", accent:"#57d06a", ink:"#06210f", pitch:"#2e7d52", home:"#4f9dff", away:"#ff8a3c", gold:"#ffd24a" } },
        { name: "Floodlit", hex: "night navy + amber",
          v: { bg:"#0a0e1a", card:"#131a2b", panel:"#131a2b", line:"#26304a", text:"#eef2f8", muted:"#8b96ad", accent:"#f5c518", ink:"#241a02", pitch:"#1f6f4a", home:"#4f9dff", away:"#ff7a59", gold:"#f5c518" } },
        { name: "Claret & Sky", hex: "classic kit",
          v: { bg:"#160b10", card:"#22121b", panel:"#22121b", line:"#3a2230", text:"#f4e9ee", muted:"#b294a3", accent:"#5cc0ff", ink:"#03192a", pitch:"#2f7d52", home:"#6cc4ff", away:"#ff7a59", gold:"#ffd24a" } },
        { name: "Chalk & Pitch", hex: "dark turf + orange",
          v: { bg:"#0c1210", card:"#141d18", panel:"#141d18", line:"#243029", text:"#f1efe6", muted:"#9aa79c", accent:"#ff7a3c", ink:"#241003", pitch:"#2d8a5a", home:"#4f9dff", away:"#ffd24a", gold:"#ffcf5a" } },
        { name: "Tangerine", hex: "warm black + tangerine",
          v: { bg:"#120f0b", card:"#1d1812", panel:"#1d1812", line:"#322a20", text:"#f4ede2", muted:"#a99c8a", accent:"#ff8c1a", ink:"#241402", pitch:"#2f9e6e", home:"#4fb0ff", away:"#ff6a3c", gold:"#ffb13c" } },
        { name: "Ice & Coral", hex: "cool slate + coral",
          v: { bg:"#0b0f12", card:"#141b20", panel:"#141b20", line:"#26313a", text:"#eaf1f5", muted:"#8aa0ad", accent:"#ff6b6b", ink:"#2a0606", pitch:"#1f7d6a", home:"#5cc0ff", away:"#ffb454", gold:"#ffd24a" } },
      ];

      const css = (v) => Object.entries(v).map(([k, val]) => `--${k}:${val}`).join(";");
      document.getElementById("grid").innerHTML = palettes.map((p) => `
        <div class="pal" style="${css(p.v)}">
          <div class="palhead"><span class="palname">${p.name}</span><span class="palhex">${p.hex}</span></div>
          <div class="panel">
            <div class="wordmark">⚽ claude<span class="ball">-ball</span></div>
            <div class="tag">You are the coach.</div>
            <button class="btn">▶ Watch</button>
          </div>
          <div class="pitch">
            <div class="dot h" style="left:24%;top:30%"></div><div class="dot h" style="left:30%;top:62%"></div>
            <div class="dot a" style="left:68%;top:40%"></div><div class="dot a" style="left:74%;top:66%"></div>
            <div class="dot b" style="left:49%;top:48%"></div>
          </div>
          <div class="panel">
            <div class="row"><div class="rank m1">🥇</div><div class="nm">blitz <span class="pill lib">house</span></div><div><div class="elo">1828</div><div class="bar"><span style="width:100%"></span></div></div></div>
            <div class="row"><div class="rank">2</div><div class="nm">chaser <span class="pill lib">house</span></div><div><div class="elo">1747</div><div class="bar"><span style="width:78%"></span></div></div></div>
            <div class="row"><div class="rank">3</div><div class="nm">laika <span class="pill you">you</span></div><div><div class="elo">1245</div><div class="bar"><span style="width:42%"></span></div></div></div>
          </div>
        </div>`).join("");
    </script>
  </body>
</html>
