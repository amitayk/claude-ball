<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>claude-ball · kickoff favicons</title>
    <style>
      body { margin: 0; background: #0c1210; color: #f1efe6; font: 15px/1.5 ui-sans-serif, system-ui, sans-serif; padding: 28px; }
      h1 { text-align: center; }
      p.intro { text-align: center; color: #9aa79c; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; max-width: 1100px; margin: 24px auto; }
      .opt { background: #141d18; border: 1px solid #243029; border-radius: 14px; padding: 16px; text-align: center; }
      .name { font-weight: 700; margin-bottom: 8px; }
      .sizes { display: flex; gap: 16px; align-items: center; justify-content: center; }
      .s16 { width: 16px; height: 16px; } .s32 { width: 32px; height: 32px; } .s64 { width: 64px; height: 64px; }
      .px { color: #5b6b60; font-size: 10px; }
      .tab { display: inline-flex; align-items: center; gap: 6px; background: #1b211e; border: 1px solid #2d342f; border-radius: 7px 7px 0 0; padding: 6px 10px; margin-top: 10px; font-size: 12px; color: #cdd6cf; }
      .tab svg { width: 16px; height: 16px; }
    </style>
  </head>
  <body>
    <h1>⚽ kickoff favicons — cb palette</h1>
    <p class="intro">Kickoff motif (centre circle + ball on the spot) in tangerine / dark / chalk. Tell me a number.</p>
    <div class="grid" id="grid"></div>

    <script>
      const T = "#ff7a3c", D = "#241003", DK = "#0c1210", C = "#f7f7f2";
      // kickoff motif, all knobs optional
      function ko({ bg, stroke, ball, line = true, r = 15, sw = 2, bx = 32, by = 32, br = 6, hi = false }) {
        return `<rect width="64" height="64" rx="14" fill="${bg}"/>
          ${line ? `<line x1="32" y1="7" x2="32" y2="57" stroke="${stroke}" stroke-width="${sw}"/>` : ""}
          <circle cx="32" cy="32" r="${r}" fill="none" stroke="${stroke}" stroke-width="${sw}"/>
          <circle cx="${bx}" cy="${by}" r="${br}" fill="${ball}"/>
          ${hi ? `<circle cx="${bx - br * 0.35}" cy="${by - br * 0.35}" r="${br * 0.3}" fill="${C}"/>` : ""}`;
      }
      const options = [
        { name: "1 · dark on tangerine", svg: ko({ bg: T, stroke: D, ball: D }) },
        { name: "2 · chalk ball", svg: ko({ bg: T, stroke: D, ball: C }) },
        { name: "3 · inverse (tangerine on dark)", svg: ko({ bg: DK, stroke: T, ball: T }) },
        { name: "4 · dark, chalk ball", svg: ko({ bg: DK, stroke: T, ball: C }) },
        { name: "5 · circle only", svg: ko({ bg: T, stroke: D, ball: D, line: false }) },
        { name: "6 · ball entering", svg: ko({ bg: T, stroke: D, ball: D, line: false, bx: 45, by: 23 }) },
        { name: "7 · chalk bg (light)", svg: ko({ bg: C, stroke: T, ball: D }) },
        { name: "8 · thick ring, chalk ball", svg: ko({ bg: T, stroke: D, ball: C, line: false, r: 16, sw: 3 }) },
        { name: "9 · dark, full motif", svg: ko({ bg: DK, stroke: T, ball: C }) },
        { name: "10 · glossy dark ball", svg: ko({ bg: T, stroke: D, ball: D, hi: true }) },
      ];
      document.getElementById("grid").innerHTML = options.map((o) => `
        <div class="opt">
          <div class="name">${o.name}</div>
          <div class="sizes">
            <div><svg class="s64" viewBox="0 0 64 64">${o.svg}</svg><div class="px">64</div></div>
            <div><svg class="s32" viewBox="0 0 64 64">${o.svg}</svg><div class="px">32</div></div>
            <div><svg class="s16" viewBox="0 0 64 64">${o.svg}</svg><div class="px">16</div></div>
          </div>
          <div class="tab"><svg viewBox="0 0 64 64">${o.svg}</svg> claude-ball</div>
        </div>`).join("");
    </script>
  </body>
</html>
